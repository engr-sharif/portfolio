# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# ==========================================================================
# CMS configuration (Sveltia / Decap compatible).
#
# AUTH: the GitHub backend needs an OAuth handshake a static host can't do
# alone. `base_url` must point at the Cloudflare Worker OAuth proxy documented
# in the README (§ Manual steps). NO client secret lives here or anywhere in
# the repo — it stays in the Worker's environment variables.
#
# LOCAL EDITING: `local_backend: true` lets Nawaz edit on his machine without
# OAuth — run `npx @sveltia/cms-server` (or `npx decap-server`) + `npm run dev`,
# then open http://localhost:4321/admin/.
# ==========================================================================
backend:
  name: github
  repo: engr-sharif/portfolio   # if the repo is renamed to engr-sharif.github.io, update this
  branch: main
  base_url: https://engr-sharif-cms-oauth.engr-sharif209.workers.dev  # Cloudflare Worker OAuth proxy

local_backend: true

# Uploaded media land here. Cover/gallery fields below override per-collection.
media_folder: "src/assets/gallery"
public_folder: "/src/assets/gallery"

publish_mode: simple
site_url: https://engr-sharif.github.io/portfolio
display_url: https://engr-sharif.github.io/portfolio
logo_url: https://engr-sharif.github.io/portfolio/favicon.svg

# Clean, URL-safe filenames + slugs (no spaces/accents/uppercase surprises).
slug:
  encoding: ascii
  clean_accents: true

# Browser-side media optimization: every uploaded photo is downscaled and
# converted to WebP *before* it's committed — so big phone originals (3-6 MB)
# become small, and filenames are slugified. Astro still generates responsive
# sizes at build; this just tames the source.
media_libraries:
  all:
    slugify_filename: true
    max_file_size: 10485760   # 10 MB hard cap on the original
    transformations:
      raster_image:
        format: webp
        quality: 82
        width: 2400
        height: 2400
      svg:
        optimize: true

# Friendlier rich-text editor defaults (WYSIWYG with a raw-markdown escape hatch).
field_defaults:
  richtext:
    modes: [rich_text, raw]
    buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote, code]

collections:
  # ---------------------------------------------------------------- Projects
  - name: projects
    label: Projects
    label_singular: Project
    icon: work
    description: "Your environmental projects. Toggle **Published** on once a project is cleared for public sharing."
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    media_folder: "/src/assets/covers"
    public_folder: "/src/assets/covers"
    preview_path: "projects/{{slug}}"
    summary: "{{title}} — {{status}} · {{published | ternary('● live', '○ draft')}}"
    sortable_fields:
      fields: [order, title, startDate]
      default: { field: order, direction: ascending }
    view_filters:
      - { label: "Live (public)", field: published, pattern: 'true' }
      - { label: "Draft (hidden)", field: published, pattern: 'false' }
      - { label: "Featured", field: featured, pattern: 'true' }
    view_groups:
      - { label: "Status", field: status }
      - { label: "Live vs draft", field: published }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: client, label: "Client / Site", widget: string, hint: "Confirm this is cleared for public sharing." }
      - { name: siteType, label: "Site type", widget: string }
      - name: status
        label: Status
        widget: select
        options: [active, complete, proposed]
        default: active
      - { name: role, label: "Your role", widget: string }
      - { name: startDate, label: "Start (YYYY-MM)", widget: string, pattern: ['^\d{4}-\d{2}$', "Use YYYY-MM"] }
      - { name: endDate, label: "End (YYYY-MM)", widget: string, required: false, pattern: ['^\d{4}-\d{2}$', "Use YYYY-MM"] }
      - { name: summary, label: "Short summary", widget: text }
      - { name: techniques, label: Techniques, widget: list, default: [] }
      - { name: coverImage, label: "Cover image", widget: image, required: false, hint: "Upload or pick an image; resolved from src/assets/covers." }
      - { name: coverAlt, label: "Cover alt text", widget: string, required: false, hint: "Describe the cover image for accessibility." }
      - { name: gallery, label: "Project gallery", widget: list, required: false, field: { name: image, label: Image, widget: image } }
      - { name: externalLink, label: "External link", widget: string, required: false }
      - { name: featured, label: "Featured (showcase)", widget: boolean, default: false }
      - { name: order, label: "Sort order", widget: number, default: 0, value_type: int }
      - name: published
        label: "Published (cleared for public sharing)"
        widget: boolean
        default: false
        hint: "Leave OFF until every site/client detail is confirmed public."
      - { name: body, label: "Write-up", widget: richtext }

  # ------------------------------------------------------------------ Blog
  - name: blog
    label: Blog
    label_singular: Post
    icon: article
    description: "Field notes & writing. New posts start as a **draft** — turn the Draft toggle OFF to publish."
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    media_folder: "/src/assets/blog"
    public_folder: "/src/assets/blog"
    preview_path: "blog/{{slug}}"
    sortable_fields:
      fields: [pubDate, title]
      default: { field: pubDate, direction: descending }
    view_filters:
      - { label: "Drafts", field: draft, pattern: true }
      - { label: "Published", field: draft, pattern: false }
    view_groups:
      - { label: "Draft status", field: draft }
      - { label: "Category", field: category }
    summary: "{{title}} · {{draft | ternary('○ draft', '● live')}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: "Excerpt / SEO description", widget: text, pattern: ['^.{0,200}$', "Keep under 200 characters"] }
      - { name: pubDate, label: "Published date", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true, default: "{{now}}" }
      - { name: updatedDate, label: "Updated date", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false, picker_utc: true }
      - { name: coverImage, label: "Cover image", widget: image, required: false, hint: "Stored as a filename; resolved from src/assets/blog." }
      - { name: coverAlt, label: "Cover alt text (accessibility)", widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: category, label: Category, widget: select, options: [field-notes, technical, professional], required: false }
      - name: relatedProject
        label: "Related project (optional)"
        widget: relation
        required: false
        collection: projects
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
      - { name: featured, label: "Featured", widget: boolean, default: false }
      - { name: canonicalURL, label: "Canonical URL (if cross-posted)", widget: string, required: false }
      - name: draft
        label: "Draft (hide from the live site)"
        widget: boolean
        default: true
        hint: "Save = publish on this site. Leave this ON until the post is ready."
      - { name: body, label: Post, widget: richtext }

  # ----------------------------------------------------------------- Tools
  - name: tools
    label: "Tools I've Built"
    label_singular: Tool
    icon: terminal
    description: "Your coding projects — each gets its own page (problem, screenshots, a code snippet, the write-up)."
    folder: "src/content/tools"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    media_folder: "/src/assets/tools"
    public_folder: "/src/assets/tools"
    preview_path: "tools/{{slug}}"
    summary: "{{name}} · {{published | ternary('● live', '○ draft')}}"
    sortable_fields:
      fields: [order, name]
      default: { field: order, direction: ascending }
    view_filters:
      - { label: "Live", field: published, pattern: 'true' }
      - { label: "Draft", field: published, pattern: 'false' }
    fields:
      - { name: name, label: Name, widget: string }
      - { name: summary, label: "One-line summary", widget: text }
      - { name: problem, label: "The problem it solves", widget: text, required: false }
      - { name: tech, label: "Tech used", widget: list, default: [] }
      - { name: repoUrl, label: "Code / repo URL", widget: string, required: false, type: url }
      - { name: liveUrl, label: "Live demo URL", widget: string, required: false, type: url }
      - name: screenshots
        label: "Screenshots"
        widget: list
        required: false
        field: { name: image, label: Image, widget: image }
        hint: "Upload screenshots of the tool — they appear in a zoomable gallery."
      - { name: codeSnippet, label: "Code snippet", widget: code, required: false, output_code_only: true, hint: "A short, representative snippet that shows how you solved a key problem." }
      - { name: codeLang, label: "Snippet language", widget: string, default: "javascript", required: false }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: order, label: "Sort order", widget: number, default: 0, value_type: int }
      - name: published
        label: "Published"
        widget: boolean
        default: false
        hint: "Turn ON to show this tool on the site."
      - { name: body, label: "Write-up (problem → approach → outcome)", widget: richtext }

  - divider: true

  # -------------------------------------------------------- Site settings
  - name: settings
    label: Site Settings
    icon: settings
    description: "Everything else: your name & bio, contact links, the field gallery, video embeds, and credentials."
    files:
      - name: site
        label: "About / Contact"
        file: "src/content/settings/site.json"
        fields:
          - { name: name, label: "Full name", widget: string }
          - { name: shortName, label: "Short name", widget: string }
          - { name: credential, label: "Credential line (hero eyebrow)", widget: string }
          - { name: heroTitle, label: "Hero headline", widget: string, required: false, hint: "Big landing-page headline. Leave blank to show your name." }
          - name: heroBackground
            label: "Hero background image"
            widget: image
            required: false
            media_folder: "/src/assets/hero"
            public_folder: "/src/assets/hero"
            hint: "Optional landscape image behind the hero (the animation drifts on top). Leave blank for animation only."
          - { name: role, label: "Role / subhead", widget: string }
          - { name: bio, label: Bio, widget: text }
          - { name: location, label: Location, widget: string }
          - { name: email, label: Email, widget: string, type: email }
          - { name: linkedin, label: "LinkedIn URL", widget: string, type: url }
          - { name: github, label: "GitHub URL", widget: string, type: url }
          - { name: resume, label: "Résumé path", widget: string, default: "/resume/Sharif_Resume.pdf" }
          - { name: resumeUpdated, label: "Résumé updated (YYYY-MM-DD)", widget: string }
          - { name: analytics, label: "GoatCounter code (analytics)", widget: string, required: false, hint: "Your GoatCounter subdomain, e.g. 'engr-sharif'. Leave blank to disable analytics." }
      - name: gallery
        label: "Field Gallery (photos)"
        file: "src/content/settings/gallery.json"
        media_folder: "/src/assets/gallery"
        public_folder: "/src/assets/gallery"
        fields:
          - { name: note, label: "Internal note", widget: text, required: false }
          - name: photos
            label: "Photos"
            label_singular: "Photo"
            widget: list
            required: false
            summary: "{{fields.alt}}"
            thumbnail: image
            collapsed: auto
            hint: "Click 'Add Photo', upload an image (it's auto-shrunk for you) and write a short description. Drag to reorder."
            fields:
              - { name: image, label: Image, widget: image, hint: "Upload a field photo straight from your phone — it's optimized automatically." }
              - { name: alt, label: "Alt text (describe the photo)", widget: string }
              - { name: caption, label: "Caption (optional)", widget: string, required: false }
      - name: media
        label: "Video embeds"
        file: "src/content/settings/media.json"
        fields:
          - { name: galleryNote, label: "Gallery note", widget: text }
          - name: videos
            label: "External videos"
            widget: list
            required: false
            fields:
              - { name: title, label: Title, widget: string }
              - { name: provider, label: Provider, widget: select, options: [youtube, vimeo], default: youtube }
              - { name: id, label: "Video ID", widget: string, required: false }
              - { name: url, label: "Full URL", widget: string, required: false }
              - { name: poster, label: "Poster (gallery filename)", widget: string, required: false }
              - { name: note, label: Note, widget: text, required: false }
      - name: profile
        label: "Credentials & Career"
        file: "src/content/settings/profile.json"
        fields:
          - name: credentials
            label: "Licensure"
            widget: list
            hint: "Keep honest — never misstate licensure status."
            fields:
              - { name: label, label: Credential, widget: string }
              - { name: issuer, label: "Issuer / jurisdiction", widget: string }
              - { name: status, label: Status, widget: string, hint: "e.g. Active, In progress, Anticipated 2027" }
              - { name: date, label: Date, widget: string }
          - name: certifications
            label: "Field certifications"
            widget: list
            required: false
            hint: "Only list certifications you actually hold and can verify."
            fields:
              - { name: label, label: Certification, widget: string }
              - { name: issuer, label: "Issuer / standard", widget: string, required: false }
              - { name: date, label: "Date earned", widget: string }
              - { name: expires, label: "Expires (if applicable)", widget: string, required: false }
          - name: timeline
            label: "Career timeline"
            widget: list
            required: false
            fields:
              - { name: date, label: Date, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: org, label: "Organization", widget: string }
              - { name: detail, label: Detail, widget: text, required: false }
