# Cloudflare Worker config for the custom Studio admin API.
#
# Deploy:  cd studio-worker && npx wrangler deploy
#
# Secrets (NEVER commit — set via CLI):
#   npx wrangler secret put STUDIO_PASSWORD     # the admin password you log in with
#   npx wrangler secret put STUDIO_JWT_SECRET   # any long random string
#   npx wrangler secret put GITHUB_TOKEN        # fine-grained PAT, contents R/W on the repo

name = "engr-sharif-studio"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPO = "engr-sharif/portfolio"
GITHUB_BRANCH = "main"
ALLOWED_ORIGIN = "https://engr-sharif.github.io"
# Optional model overrides for the AI assistant. Defaults: Llama 3.3 70B for
# text (best writing quality on Workers AI) and LLaVA for vision. Drop the text
# model to "@cf/meta/llama-3.1-8b-instruct" if you want faster/cheaper edits.
# AI_TEXT_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# AI_VISION_MODEL = "@cf/llava-hf/llava-1.5-7b-hf"

# Cloudflare Workers AI — powers the in-Studio assistant (free tier, open models).
# This binding gives the Worker `env.AI`. No API key needed; it uses your
# Cloudflare account. After adding this, redeploy:  npx wrangler deploy
[ai]
binding = "AI"
