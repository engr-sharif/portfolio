name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Nightly rebuild so the GitHub "Code" section stays fresh without a push.
  schedule:
    - cron: '0 7 * * *'

# Permissions required by the official GitHub Pages deploy flow.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22  # Astro 6 requires Node >=22.12
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          # Authenticated GitHub API (5,000 req/hr) for the "Code" repo fetch
          # in scripts/fetch-github-repos.mjs (runs via the prebuild script).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: engr-sharif

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (with the "GitHub Actions" source) via the
          # API on first run, so no manual Settings → Pages toggle is needed.
          # Requires the `pages: write` permission set above.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
